<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>The Archive — Peoples Garments</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; background:#fff; font-family:Arial, sans-serif; }

/* NAV */
.nav {
  display:flex; align-items:flex-start; justify-content:space-between;
  padding:22px 28px; position:relative; z-index:20;
}
.nav-left { display:flex; gap:32px; align-items:center; position:relative; }
.nav-left button {
  font-size:12px; letter-spacing:-0.02em; font-family:Arial,sans-serif;
  font-weight:700; color:#111; text-transform:uppercase;
  cursor:pointer; background:none; border:none; padding:0;
}
.dropdown {
  display:none; position:absolute; top:100%; left:0; margin-top:12px;
  flex-direction:column; gap:9px; z-index:50; background:#fff; padding:2px 0;
}
.dropdown.open { display:flex; }
.dropdown a {
  font-size:11px; letter-spacing:-0.02em; font-family:Arial,sans-serif; font-weight:700;
  color:#111; text-decoration:none; white-space:nowrap; text-transform:uppercase;
}
.dropdown a:hover { opacity:0.6; }
.nav-brand {
  position:absolute; left:50%; top:22px; transform:translateX(-50%);
  font-size:12px; letter-spacing:-0.05em; font-family:Arial,sans-serif;
  font-weight:700; color:#111; text-transform:none; white-space:nowrap;
}
.nav-right { display:flex; align-items:center; gap:18px; }
.nav-right svg { width:19px; height:19px; stroke:#111; fill:none; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; cursor:pointer; }
.nav-right button {
  font-size:12px; letter-spacing:-0.02em; font-family:Arial,sans-serif;
  font-weight:700; color:#111; text-transform:uppercase;
  cursor:pointer; background:none; border:none; padding:0;
}

/* HEADER — large vertical title fixed to the right edge, stays put while the grid scrolls */
.archive-title {
  position:fixed; top:50%; right:18px; transform:translateY(-50%) rotate(180deg);
  writing-mode:vertical-rl; z-index:15; pointer-events:none;
}
.archive-title h1 {
  font-family:Arial, sans-serif; font-weight:800; font-size:6.51rem;
  letter-spacing:-0.05em; color:#111; text-transform:lowercase; line-height:1;
  white-space:nowrap;
}

/* GRID — 2+2 column grouping, narrower center gutter, right padding clears the fixed title */
.grid {
  display:grid; grid-template-columns: 1fr 1fr minmax(12px,40px) 1fr 1fr;
  column-gap:22.8px; row-gap:48px;
  padding:36px 190px 100px 28px;
}
.card { cursor:pointer; width:78%; }
.card:nth-child(4n+1) { grid-column:1; }
.card:nth-child(4n+2) { grid-column:2; transform: translateX(-5%); }
.card:nth-child(4n+3) { grid-column:4; }
.card:nth-child(4n+4) { grid-column:5; margin-left:auto; }
.card-media { width:100%; display:block; background:#eaeaea; }
.card-media img { width:100%; display:block; object-fit:cover; }
.card-meta {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:6px; font-family:Arial, sans-serif;
}
.card-user {
  font-size:9.98px; font-weight:700; letter-spacing:-0.02em; color:#111; text-transform:uppercase;
}
.card-stars { display:flex; align-items:center; gap:4px; }
.card-stars .star-icon { width:15px; height:15px; cursor:pointer; display:block; }
.card-stars span { font-size:11px; color:#111; font-weight:400; }

@media (max-width:900px) {
  .grid { grid-template-columns:1fr 1fr; padding:36px 100px 100px 20px; }
  .card:nth-child(4n+1),.card:nth-child(4n+3){grid-column:1;}
  .card:nth-child(4n+2),.card:nth-child(4n+4){grid-column:2; transform:none; margin-left:0;}
  .card { width:101.93%; }
  .card-user { font-size:8.56px; }
  .archive-title h1 { font-size:2.3562rem; }
  .nav { flex-wrap:wrap; row-gap:14px; }
  .nav-brand { display:none; }
}

/* MODAL — black rectangle, 50% dim backdrop, tight Arial tracking/leading */
.overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.5); align-items:flex-start; justify-content:center;
  overflow-y:auto; padding:56px 20px;
}
.overlay.open { display:flex; }
.story-modal {
  width:357px; max-width:100%; background:#0d1117;
  box-shadow:0 20px 60px rgba(0,0,0,0.4); overflow:hidden; position:relative;
}
.story-modal-close {
  position:absolute; top:12px; right:16px; background:none; border:none;
  color:#fff; font-size:16px; font-family:Arial,sans-serif; cursor:pointer; z-index:2;
}
.story-modal img { width:100%; display:block; }
.story-body { padding:18px 22px 26px; }
.story-head {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
}
.story-user {
  font-size:14px; font-weight:700; letter-spacing:-0.02em; color:#7d8184; text-transform:uppercase;
}
.story-actions { display:flex; align-items:center; gap:10px; }
.story-actions svg { width:15px; height:15px; stroke:#8a8f94; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; cursor:pointer; }
.story-actions .star-icon { width:16px; height:16px; cursor:pointer; display:block; filter:invert(56%); }
.story-actions span { font-size:11px; color:#8a8f94; letter-spacing:-0.02em; }
.story-row { margin-bottom:14px; display:flex; gap:6px; }
.story-label {
  font-size:11px; font-weight:700; letter-spacing:-0.02em; color:#8a8f94;
  text-transform:uppercase; flex-shrink:0; min-width:76px; line-height:1.3;
}
.story-text { font-size:12px; font-weight:400; letter-spacing:-0.02em; line-height:1.3; color:#7d8184; }
.story-section-title {
  font-size:11px; font-weight:700; letter-spacing:-0.02em; color:#8a8f94;
  text-transform:uppercase; margin-bottom:6px; line-height:1.3;
}
.story-para { font-size:12px; font-weight:400; letter-spacing:-0.02em; line-height:1.3; color:#7d8184; }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#0d1117; color:#fff; font-size:11px; letter-spacing:-0.02em;
  padding:9px 16px; z-index:600; opacity:0; pointer-events:none; transition:opacity .2s;
}
.toast.show { opacity:1; }
</style>

function starIcon(slug, liked, cls) {
  const src = liked ? STAR_FILLED : STAR_OUTLINE;
  return `<img class="star-icon ${cls||''}" data-slug="${slug}" src="${src}" onclick="toggleLike(event,'${slug}')" alt="like"/>`;
}

let stories = [];
window.toggleLike = (evt, slug) => toggleLike(evt, slug);
window.closeStory = () => closeStory();
window.shareStory = () => shareStory();

const grid = document.getElementById('archiveGrid');

function renderGrid() {
  grid.innerHTML = '';
  stories.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openStory(i, true);
    card.innerHTML = `
      <div class="card-media"><img src="${s.img}" alt="${s.user}"/></div>
      <div class="card-meta">
        <div class="card-user">${s.user}</div>
        <div class="card-stars">${starIcon(s.slug, isLiked(s.slug))}<span id="cardLikes-${s.slug}">${likeCount(s)}</span></div>
      </div>
    `;
    grid.appendChild(card);
  });
}

async function loadStories() {
  const { data, error } = await supabase
    .from('stories')
    .select('*')
    .eq('status', 'approved')
    .order('submitted_at', { ascending: false });

  if (error) {
    console.error('Failed to load stories:', error.message || error);
    return;
  }

  stories = (data || [])
    .filter(row => row.image_urls && row.image_urls.length > 0)
    .map(row => ({
      slug: row.id,
      user: row.instagram ? '@' + row.instagram.replace('@', '') : (row.name || 'Anonymous'),
      likes: row.likes || 0,
      img: row.image_urls[0],
      garment: row.garment_name || '',
      origin: row.origin || '',
      story: row.memory_story || ''
    }));

  renderGrid();

  // deep-link: open story straight to its pop-up if URL has #slug (for shared links)
  const hash = location.hash.replace('#', '');
  if (hash) {
    const idx = stories.findIndex(s => s.slug === hash);
    if (idx > -1) openStory(idx, false);
  }
}

loadStories();

function isLiked(slug) {
  return localStorage.getItem('liked_' + slug) === '1';
}
function likeCount(s) {
  return s.likes || 0;
}
async function toggleLike(evt, slug) {
  if (evt) evt.stopPropagation();
  if (!slug) return;
  const s = stories.find(x => x.slug === slug);
  if (!s) return;

  const liked = isLiked(slug);
  const delta = liked ? -1 : 1;

  // optimistic UI update so the click feels instant
  s.likes = Math.max((s.likes || 0) + delta, 0);
  localStorage.setItem('liked_' + slug, liked ? '0' : '1');
  renderStarState(slug);

  const { data, error } = await supabase.rpc('increment_story_likes', {
    story_id: slug,
    delta: delta
  });

  if (error) {
    // revert on failure
    s.likes = Math.max((s.likes || 0) - delta, 0);
    localStorage.setItem('liked_' + slug, liked ? '1' : '0');
    renderStarState(slug);
    return;
  }

  // reconcile with the real server count (in case others liked it meanwhile)
  s.likes = data;
  renderStarState(slug);
}
function renderStarState(slug) {
  const liked = isLiked(slug);
  const s = stories.find(x => x.slug === slug);
  const count = likeCount(s);
  const cardIcon = document.querySelector(`.card-stars .star-icon[data-slug="${slug}"]`);
  if (cardIcon) cardIcon.src = liked ? STAR_FILLED : STAR_OUTLINE;
  const cardCount = document.getElementById('cardLikes-' + slug);
  if (cardCount) cardCount.textContent = count;
  if (window._currentStory && window._currentStory.slug === slug) {
    document.getElementById('storyStarIcon').src = liked ? STAR_FILLED : STAR_OUTLINE;
    document.getElementById('storyLikes').textContent = count;
  }
}

function openStory(i, pushHash) {
  const s = stories[i];
  document.getElementById('storyImg').src = s.img;
  document.getElementById('storyUser').textContent = s.user;
  document.getElementById('storyGarment').textContent = s.garment;
  document.getElementById('storyOrigin').textContent = s.origin;
  document.getElementById('storyStory').textContent = s.story;
  document.getElementById('storyOverlay').classList.add('open');
  window._currentStory = s;
  renderStarState(s.slug);
  if (pushHash) history.replaceState(null, '', '#' + s.slug);
}
function closeStory() {
  document.getElementById('storyOverlay').classList.remove('open');
  history.replaceState(null, '', location.pathname);
}
function shareStory() {
  const s = window._currentStory;
  if (!s) return;
  const url = location.origin + location.pathname + '#' + s.slug;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(showToast).catch(showToast);
  } else {
    showToast();
  }
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}
</script>
